<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - MAA DIGITAL</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Copy header from index.html -->
    
    <section class="page-header">
        <div class="container">
            <h1 class="page-title">Contact Us</h1>
            <p class="page-subtitle">Get in touch with us for any queries</p>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <div style="max-width: 600px; margin: 0 auto;">
                <form id="contactForm">
                    <div class="form-group">
                        <label class="form-label">Name *</label>
                        <input type="text" id="name" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email *</label>
                        <input type="email" id="email" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone *</label>
                        <input type="tel" id="phone" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Subject *</label>
                        <input type="text" id="subject" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Message *</label>
                        <textarea id="message" class="form-textarea" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Copy footer from index.html -->
    <script src="script.js"></script>
</body>
</html>
